# =====================================================================
# Production reverse-proxy config (place on host or in nginx container)
# Drop-in template — replace SERVER_NAME and SSL paths.
# =====================================================================

upstream api_upstream {
    server api:4002;
    keepalive 32;
}

upstream web_upstream {
    server web:80;
    keepalive 16;
}

# HTTP → HTTPS redirect (enable once certs are issued)
# server {
#     listen 80;
#     server_name tubaalhijaz.com www.tubaalhijaz.com;
#     return 301 https://$host$request_uri;
# }

server {
    listen 80 default_server;
    # listen 443 ssl http2;
    server_name _;

    # ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    # ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    # ssl_protocols TLSv1.2 TLSv1.3;
    # ssl_ciphers HIGH:!aNULL:!MD5;
    # ssl_prefer_server_ciphers on;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=(self)" always;

    client_max_body_size 25m;

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript application/xml+rss text/javascript image/svg+xml;

    # API proxy
    location /api/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Request-ID      $request_id;
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # WebSocket support (real-time tracking, notifications)
    location /ws/ {
        proxy_pass http://api_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host       $host;
        proxy_read_timeout 3600s;
    }

    # User-uploaded files (mounted volume)
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public";
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Health (passes through to API)
    location = /health {
        proxy_pass http://api_upstream/api/health;
        access_log off;
    }

    # Frontend (SPA container)
    location / {
        proxy_pass http://web_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host       $host;
        proxy_set_header X-Real-IP  $remote_addr;
    }
}
