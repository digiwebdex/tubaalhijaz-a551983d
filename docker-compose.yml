# =====================================================================
# Local development & single-host production stack
#   docker compose up -d
# =====================================================================
version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tubaalhijaz}
      POSTGRES_USER: ${POSTGRES_USER:-tubaalhijaz}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./server/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tubaalhijaz}"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--maxmemory", "256mb", "--maxmemory-policy", "allkeys-lru"]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: server/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4002
      DATABASE_URL: postgresql://${POSTGRES_USER:-tubaalhijaz}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-tubaalhijaz}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:?JWT_REFRESH_SECRET is required}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost}
      BULKSMSBD_API_KEY: ${BULKSMSBD_API_KEY:-}
      BULKSMSBD_SENDER_ID: ${BULKSMSBD_SENDER_ID:-}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      NOTIFICATION_FROM_EMAIL: ${NOTIFICATION_FROM_EMAIL:-}
    volumes:
      - uploads_data:/app/uploads
      - api_logs:/app/logs
    ports:
      - "4002:4002"

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - "8080:80"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - api
      - web
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - uploads_data:/var/www/uploads:ro

volumes:
  postgres_data:
  redis_data:
  uploads_data:
  api_logs:
